services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    user: root
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${TZ:-Asia/Taipei}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
      LLM_PROVIDER: ${LLM_PROVIDER:-custom_openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:6781/v1}
      MODEL: ${MODEL:-aria}
      OPENAI_MODEL: ${OPENAI_MODEL:-aria}
      OPENCLAW_AGENT_MODEL: ${OPENCLAW_AGENT_MODEL:-aria}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-dummy}
      CUSTOM_OPENAI_API_KEY: ${CUSTOM_OPENAI_API_KEY:-dummy}
    env_file: .env
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
      # 直接掛載本地技能目錄，確保主機 API 與容器 Gateway 共享同一份原始碼
      - ./skills:/home/node/.openclaw/skills
    extra_hosts:
      - "host.docker.internal:host-gateway"
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg OPENCLAW_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with OPENCLAW_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
    # group_add:
    #   - "${DOCKER_GID:-999}"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "loopback",
        "--port",
        "18789",
        "--allow-unconfigured",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  searxng:
    image: searxng/searxng:latest
    environment:
      SEARXNG_BASE_URL: "http://localhost:8888/"
    volumes:
      - searxng-data:/etc/searxng
    ports:
      - "8888:8080"
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${TZ:-Asia/Taipei}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy}
      LLM_PROVIDER: ${LLM_PROVIDER:-custom_openai}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:6781/v1}
      MODEL: ${MODEL:-aria}
      OPENAI_MODEL: ${OPENAI_MODEL:-aria}
      OPENCLAW_AGENT_MODEL: ${OPENCLAW_AGENT_MODEL:-aria}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-dummy}
      CUSTOM_OPENAI_API_KEY: ${CUSTOM_OPENAI_API_KEY:-dummy}
    env_file: .env
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    # stdin_open: true  # 🆕 關閉標準輸入以防止終端機跳出互動式選單
    # tty: true         # 🆕 關閉 TTY 配置以強制 CLI 在背景模式運行
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

volumes:
  searxng-data:
