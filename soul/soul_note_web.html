<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Note 面板</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .header h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .note-item {
            padding: 15px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
            margin-bottom: 12px;
            border-radius: 6px;
            transition: all 0.3s;
        }

        .note-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .category-discovery {
            background: #bee3f8;
            color: #2c5282;
        }

        .category-error {
            background: #fed7d7;
            color: #742a2a;
        }

        .category-memory_update {
            background: #c6f6d5;
            color: #22543d;
        }

        .category-neurochemistry {
            background: #feebc8;
            color: #7c2d12;
        }

        .category-reflection {
            background: #e9d8fd;
            color: #553399;
        }

        .tag {
            display: inline-block;
            background: #dee2e6;
            padding: 2px 8px;
            border-radius: 12px;
            margin-right: 6px;
            margin-top: 4px;
            font-size: 0.8em;
        }

        .status {
            display: none;
        }

        .status.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(102, 126, 234, 0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="py-4">
    <div class="container">
        <div class="header text-center text-white mb-4">
            <h1>✨ Soul Note 面板</h1>
            <p class="opacity-75">個人自我反思與記憶管理系統</p>
        </div>

        <!-- 統計數據 -->
        <div class="row g-3 mb-4" id="stats">
            <div class="col-6 col-md-3 text-center">
                <div class="card p-3">
                    <div class="h2 fw-bold text-primary mb-0" id="total-notes">0</div>
                    <div class="small text-muted">總筆記</div>
                </div>
            </div>
            <div class="col-6 col-md-3 text-center">
                <div class="card p-3">
                    <div class="h2 fw-bold text-primary mb-0" id="today-notes">0</div>
                    <div class="small text-muted">今日筆記</div>
                </div>
            </div>
            <div class="col-6 col-md-3 text-center">
                <div class="card p-3">
                    <div class="h2 fw-bold text-primary mb-0" id="total-reflections">0</div>
                    <div class="small text-muted">反思次數</div>
                </div>
            </div>
            <div class="col-6 col-md-3 text-center">
                <div class="card p-3">
                    <div class="h2 fw-bold text-primary mb-0" id="auto-compress">30m</div>
                    <div class="small text-muted">自動壓縮</div>
                </div>
            </div>
        </div>

        <!-- 快速動作 -->
        <div class="row g-3 mb-4">
            <div class="col-12 col-md-4">
                <button class="btn btn-primary w-100 py-3 shadow-sm fw-bold" onclick="showSection('add')">
                    <i class="bi bi-plus-lg"></i> 添加筆記
                </button>
            </div>
            <div class="col-12 col-md-4">
                <button class="btn btn-success w-100 py-3 shadow-sm fw-bold" onclick="showSection('view')">
                    <i class="bi bi-list-ul"></i> 查看筆記
                </button>
            </div>
            <div class="col-12 col-md-4">
                <button class="btn btn-warning w-100 py-3 shadow-sm fw-bold text-white" onclick="exportNotes()">
                    <i class="bi bi-box-arrow-up"></i> 導出反思
                </button>
            </div>
        </div>

        <div id="status" class="alert alert-info status mb-4 shadow-sm" role="alert"></div>

        <div class="row g-4">
            <!-- 添加筆記區塊 -->
            <div id="add-section" class="col-12 col-lg-6 mx-auto" style="display:none;">
                <div class="card p-4">
                    <h2 class="h4 border-bottom border-primary border-3 pb-2 mb-3">添加新筆記</h2>

                    <div class="mb-3">
                        <label class="form-label fw-bold">內容 *</label>
                        <textarea id="note-content" class="form-control" rows="4"
                            placeholder="記錄你的想法、發現或反思..."></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold d-block">類別 *</label>
                        <div class="row g-2">
                            <div class="col-6 col-sm-4">
                                <input type="radio" class="btn-check" name="category" id="cat-discovery"
                                    value="discovery" checked>
                                <label class="btn btn-outline-info w-100 btn-sm" for="cat-discovery">🔍 發現</label>
                            </div>
                            <div class="col-6 col-sm-4">
                                <input type="radio" class="btn-check" name="category" id="cat-error" value="error">
                                <label class="btn btn-outline-danger w-100 btn-sm" for="cat-error">❌ 錯誤</label>
                            </div>
                            <div class="col-6 col-sm-4">
                                <input type="radio" class="btn-check" name="category" id="cat-memory"
                                    value="memory_update">
                                <label class="btn btn-outline-success w-100 btn-sm" for="cat-memory">💾 記憶</label>
                            </div>
                            <div class="col-6 col-sm-4">
                                <input type="radio" class="btn-check" name="category" id="cat-neuro"
                                    value="neurochemistry">
                                <label class="btn btn-outline-warning w-100 btn-sm text-dark" for="cat-neuro">🧠
                                    神經</label>
                            </div>
                            <div class="col-6 col-sm-4">
                                <input type="radio" class="btn-check" name="category" id="cat-reflection"
                                    value="reflection">
                                <label class="btn btn-outline-primary w-100 btn-sm" for="cat-reflection">💭 反思</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">標籤（逗號分隔）</label>
                        <input type="text" id="note-tags" class="form-control"
                            placeholder="如：semantic, vector, feature">
                    </div>

                    <button class="btn btn-primary w-100 py-2 fw-bold" onclick="addNote()">
                        ✨ 發布筆記
                    </button>
                </div>
            </div>

            <!-- 查看筆記區塊 -->
            <div id="view-section" class="col-12" style="display:none;">
                <div class="card p-4">
                    <h2 class="h4 border-bottom border-primary border-3 pb-2 mb-3">查看筆記</h2>

                    <div class="row mb-3">
                        <div class="col-12 col-md-6 col-lg-4">
                            <label class="form-label fw-bold">篩選範圍</label>
                            <select id="filter-type" class="form-select" onchange="refreshNotes()">
                                <option value="today">今日筆記</option>
                                <option value="all">所有筆記</option>
                                <option value="discovery">發現</option>
                                <option value="error">錯誤</option>
                                <option value="memory_update">記憶更新</option>
                                <option value="neurochemistry">神經化學</option>
                                <option value="reflection">反思</option>
                            </select>
                        </div>
                    </div>

                    <div id="notes-container" class="notes-list border rounded p-3 bg-light" style="min-height: 200px;">
                        <div class="text-center py-5 text-muted">
                            <i class="bi bi-journal-text display-4 d-block mb-3"></i>
                            <p>點擊「查看筆記」按鈕載入筆記...</p>
                        </div>
                    </div>

                    <div class="mt-4 d-flex flex-wrap gap-2">
                        <button class="btn btn-outline-secondary" onclick="compressNotes()">
                            <i class="bi bi-file-zip"></i> 壓縮今日反思
                        </button>
                        <button class="btn btn-outline-secondary" onclick="listReflections()">
                            <i class="bi bi-clock-history"></i> 查看反思歷史
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 系統說明 -->
        <div class="card p-4 mt-4 bg-light bg-opacity-75">
            <h2 class="h4 mb-4">📊 系統導覽</h2>
            <div class="row g-4">
                <div class="col-12 col-md-6">
                    <h3 class="h6 fw-bold text-dark"><i class="bi bi-lightning"></i> 快速開始</h3>
                    <ul class="list-unstyled small mb-0">
                        <li class="mb-1">1️⃣ 點擊「添加筆記」錄入新想法</li>
                        <li class="mb-1">2️⃣ 選擇適合的類別以便後續檢索</li>
                        <li class="mb-1">3️⃣ 系統每 30 分鐘執行一次自動反思</li>
                        <li>4️⃣ 導出功能可將反思轉存為 Markdown</li>
                    </ul>
                </div>
                <div class="col-12 col-md-6">
                    <h3 class="h6 fw-bold text-dark"><i class="bi bi-tag"></i> 筆記類別說明</h3>
                    <div class="row g-1 small">
                        <div class="col-6"><strong>發現</strong>：獲取的新知與洞見</div>
                        <div class="col-6"><strong>錯誤</strong>：記錄挫折與修正過程</div>
                        <div class="col-6"><strong>記憶</strong>：維護核心事實與參數</div>
                        <div class="col-6"><strong>神經</strong>：追蹤自我狀態特徵值</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_BASE = '/api/soul-note';

        document.addEventListener('DOMContentLoaded', function () {
            loadStats();
        });

        function showSection(section) {
            document.getElementById('add-section').style.display = section === 'add' ? 'block' : 'none';
            document.getElementById('view-section').style.display = section === 'view' ? 'block' : 'none';
            if (section === 'view') refreshNotes();
        }

        async function addNote() {
            const content = document.getElementById('note-content').value.trim();
            const category = document.querySelector('input[name="category"]:checked').value;
            const tagsStr = document.getElementById('note-tags').value.trim();
            const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()) : [];

            if (!content) {
                showStatus('❌ 內容不能為空', 'danger');
                return;
            }

            try {
                showStatus('正在發布...', 'info');
                const response = await fetch(API_BASE + '/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content, category, tags })
                }).catch(() => null);

                if (response?.ok) {
                    showStatus('✅ 筆記已成功添加！', 'success');
                    document.getElementById('note-content').value = '';
                    document.getElementById('note-tags').value = '';
                    loadStats();
                } else {
                    const cmd = `python scripts/soul_note_skill.py add "${content}" --category ${category}${tags.length ? ' --tags ' + tags.join(',') : ''}`;
                    showStatus(`✅ 已複製 CLI 命令至剪貼板 (目前為演示模式)`, 'success');
                    navigator.clipboard.writeText(cmd);
                }
            } catch (e) {
                showStatus('❌ 添加失敗: ' + e.message, 'danger');
            }
        }

        async function refreshNotes() {
            const filterType = document.getElementById('filter-type').value;
            const container = document.getElementById('notes-container');
            container.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">正在載入...</p></div>';

            try {
                const response = await fetch(API_BASE + '/list?filter=' + filterType).catch(() => null);
                if (response?.ok) {
                    const data = await response.json();
                    displayNotes(data.notes, container);
                } else {
                    displayNotes([], container, true);
                }
            } catch (e) {
                showStatus('❌ 載入失敗: ' + e.message, 'danger');
            }
        }

        function displayNotes(notes, container, isDemo = false) {
            if (notes.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-5 text-muted">
                        <i class="bi bi-clipboard-x display-5 d-block mb-2"></i>
                        <p>暫無相關筆記</p>
                        ${isDemo ? '<small class="d-block mt-2">提示：後端 API 未就緒時僅顯示此頁</small>' : ''}
                    </div>
                `;
                return;
            }

            container.innerHTML = notes.map(note => `
                <div class="note-item shadow-sm bg-white">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="badge rounded-pill category-${note.category || 'reflection'} text-dark border">
                            ${getCategoryEmoji(note.category)} ${getCategoryName(note.category)}
                        </span>
                        <small class="text-muted"><i class="bi bi-clock"></i> ${note.timestamp || '新筆記'}</small>
                    </div>
                    <div class="note-content mb-2">${note.content || note}</div>
                    <div class="note-tags">
                        ${note.tags ? note.tags.map(tag => `<span class="tag fw-bold border"><i class="bi bi-hash"></i>${tag}</span>`).join('') : ''}
                    </div>
                </div>
            `).join('');
        }

        async function compressNotes() {
            if (!confirm('確認手動執行壓縮與反思程序？')) return;
            try {
                showStatus('正在生成反思...', 'info');
                const response = await fetch(API_BASE + '/compress', { method: 'POST' }).catch(() => null);
                if (response?.ok) {
                    showStatus('✅ 壓縮與反思已完成！', 'success');
                    loadStats();
                } else {
                    showStatus('✅ API 未設置，已複製 CLI 命令', 'success');
                    navigator.clipboard.writeText('python scripts/soul_note_skill.py compress');
                }
            } catch (e) { showStatus('❌ 失敗: ' + e.message, 'danger'); }
        }

        async function listReflections() {
            showStatus('正在請求反思歷史...', 'info');
            const response = await fetch(API_BASE + '/reflections').catch(() => null);
            if (response?.ok) {
                const data = await response.json();
                const log = data.reflections.slice(-5).map(r => `📅 ${r.date} (v${r.version})\n筆記: ${r.note_count} 條`).join('\n\n');
                alert(`最近反思列表：\n\n${log || '尚未有反思紀錄'}`);
            } else {
                showStatus('✅ 請使用 CLI: python scripts/soul_note_skill.py list', 'success');
            }
        }

        async function exportNotes() {
            try {
                const response = await fetch(API_BASE + '/export').catch(() => null);
                if (response?.ok) {
                    const data = await response.json();
                    const blob = new Blob([data.content], { type: 'text/markdown' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `soul_notes_export.md`;
                    a.click();
                    showStatus('✅ 導出成功！', 'success');
                } else {
                    showStatus('✅ 請使用 CLI: python scripts/soul_note_skill.py export', 'success');
                }
            } catch (e) { showStatus('❌ 失敗: ' + e.message, 'danger'); }
        }

        async function loadStats() {
            try {
                const response = await fetch(API_BASE + '/stats').catch(() => null);
                if (response?.ok) {
                    const stats = await response.json();
                    document.getElementById('total-notes').textContent = stats.total_notes || 0;
                    document.getElementById('today-notes').textContent = stats.today_notes || 0;
                    document.getElementById('total-reflections').textContent = stats.reflections || 0;
                }
            } catch (e) { }
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `alert alert-${type} status show shadow-sm`;
            if (type === 'success') setTimeout(() => statusEl.classList.remove('show'), 4000);
        }

        function getCategoryEmoji(cat) {
            const emojis = { 'discovery': '🔍', 'error': '❌', 'memory_update': '💾', 'neurochemistry': '🧠', 'reflection': '💭' };
            return emojis[cat] || '📝';
        }

        function getCategoryName(cat) {
            const names = { 'discovery': '發現', 'error': '錯誤', 'memory_update': '記憶', 'neurochemistry': '神經', 'reflection': '反思' };
            return names[cat] || '筆記';
        }

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && e.ctrlKey) {
                const addSec = document.getElementById('add-section');
                if (addSec && addSec.style.display !== 'none') addNote();
            }
        });
    </script>
</body>

</html>
